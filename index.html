<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض السيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000008;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 10px;
            background: #00000d;
            border-bottom: 1px solid #1a1a3a;
        }
        .logo {
            color: #d4af37;
            font-size: 22px;
            font-weight: 700;
        }
        .page-title {
            font-size: 16px;
            color: #b0b0c0;
        }

        .gallery {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 0 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== كارد السيارة ===== */
        .car-card {
            background: #0a0a1a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1a1a3a;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .car-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.12);
        }
        .car-card.featured {
            border: 1px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        .card-top {
            display: flex;
            padding: 12px;
            gap: 14px;
            align-items: center;
        }
        .car-img-wrap {
            position: relative;
            width: 130px;
            height: 100px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            order: 0;
        }
        .car-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img-count {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0, 0, 0, 0.8);
            color: #d4af37;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
        }
        .status-badge {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
        }
        .car-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }
        .price {
            color: #d4af37;
            font-size: 18px;
            font-weight: 700;
        }

        .card-actions {
            padding: 0 12px 12px;
        }
        .btn-details {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #1a1a3a;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-details:hover {
            background: #2a2a5a;
        }

        .no-cars {
            text-align: center;
            color: #888;
            font-size: 16px;
            padding: 40px;
        }

        /* ===== مودال التفاصيل ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: #0a0a1a;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== سلايدر الصور ===== */
        .slider-container {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: #00000d;
        }
        .slider-slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }
        .slider-slide {
            min-width: 100%;
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .slider-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 5;
        }
        .slider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .slider-dot.active {
            background: #d4af37;
        }
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-arrow.prev {
            left: 10px;
        }
        .slider-arrow.next {
            right: 10px;
        }
        .slider-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #d4af37;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 5;
            font-weight: 700;
        }

        /* ===== محتوى المودال ===== */
        .modal-header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #0a0a1a;
            border-bottom: 1px solid #1a1a3a;
        }
        .modal-header .brand {
            color: #d4af37;
            font-size: 18px;
            font-weight: 700;
        }
        .close-x {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .modal-body {
            padding: 18px 15px 100px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 6px;
            text-align: center;
        }
        .modal-price {
            font-size: 22px;
            font-weight: 700;
            color: #d4af37;
            text-align: center;
            margin-bottom: 18px;
        }

        /* ===== المواصفات الأساسية (4 فقط) ===== */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }
        .spec-box {
            background: #0f0f22;
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #1a1a3a;
            transition: 0.2s;
        }
        .spec-box:hover {
            border-color: #d4af37;
        }
        .spec-box .spec-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .spec-box .spec-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }
        .spec-box .spec-value {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }
        .spec-box .spec-value.gold {
            color: #d4af37;
        }

        /* ===== مربع الوصف ===== */
        .desc-section {
            margin-bottom: 18px;
        }
        .desc-title {
            font-size: 14px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 8px;
            border-right: 3px solid #d4af37;
            padding-right: 8px;
        }
        .desc-text {
            background: #0f0f22;
            border-radius: 12px;
            padding: 14px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.8;
            border: 1px solid #1a1a3a;
            min-height: 60px;
        }

        /* ===== أزرار المودال ===== */
        .modal-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            background: #0a0a1a;
            border-top: 1px solid #1a1a3a;
            z-index: 20;
            max-width: 480px;
            margin: 0 auto;
        }
        .modal-act-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .modal-act-btn.work {
            background: #d4af37;
            color: #000;
        }
        .modal-act-btn.work:hover {
            background: #c5a030;
            transform: scale(1.02);
        }
        .modal-act-btn.sold {
            background: #22c55e;
            color: #fff;
        }
        .modal-act-btn.sold:hover {
            background: #1a9e4a;
        }
        .modal-act-btn.danger {
            background: #dc2626;
            color: #fff;
        }
        .modal-act-btn.danger:hover {
            background: #b91c1c;
        }
        .modal-act-btn.close-btn {
            background: #555;
            color: #fff;
        }
        .modal-act-btn.close-btn:hover {
            background: #666;
        }
        .loading-modal {
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }

        /* ===== حالة العمل في المودال ===== */
        .work-status-banner {
            background: #1a2a1a;
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
            text-align: center;
        }
        .work-status-banner .title {
            color: #d4af37;
            font-weight: 700;
        }
        .work-status-banner .sub {
            color: #aaa;
            font-size: 13px;
        }
        .sold-status-banner {
            background: #2a1a1a;
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
            text-align: center;
        }
        .sold-status-banner .title {
            color: #dc2626;
            font-weight: 700;
        }

        /* ===== الشريط السفلي ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #00000d;
            border-top: 1px solid #1a1a3a;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #888;
            font-size: 11px;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: 0.2s;
            font-family: inherit;
            position: relative;
        }
        .nav-item.active {
            color: #d4af37;
        }
        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
        }
        .nav-item.active svg {
            stroke: #d4af37;
        }
        .nav-item:hover {
            color: #d4af37;
        }
        .badge-count {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #d4af37;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== مودال البحث ===== */
        .search-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .search-modal-overlay.open {
            display: flex;
        }
        .search-modal-box {
            background: #0a0a1a;
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 440px;
            width: 100%;
            border: 1px solid #1a1a3a;
            animation: slideUp 0.25s ease;
        }
        .search-modal-box h3 {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 18px;
            text-align: center;
        }
        .search-modal-box .field {
            margin-bottom: 12px;
        }
        .search-modal-box .field label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .search-modal-box .field input,
        .search-modal-box .field select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #1a1a3a;
            background: #00000d;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .search-modal-box .field input:focus,
        .search-modal-box .field select:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
        }
        .search-modal-box .search-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .search-modal-box .search-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-search-go {
            background: #d4af37;
            color: #000;
        }
        .btn-search-go:hover {
            background: #c5a030;
        }
        .btn-search-cancel {
            background: #1a1a3a;
            color: #fff;
        }
        .btn-search-cancel:hover {
            background: #2a2a5a;
        }

        /* ===== مودال بدأ العمل ===== */
        .work-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 400;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .work-modal-overlay.open {
            display: flex;
        }
        .work-modal-box {
            background: #0a0a1a;
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #d4af37;
            animation: slideUp 0.25s ease;
        }
        .work-modal-box h3 {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 6px;
            text-align: center;
        }
        .work-modal-box .sub {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 18px;
        }
        .work-modal-box input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #1a1a3a;
            background: #00000d;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            text-align: center;
            margin-bottom: 14px;
        }
        .work-modal-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }
        .work-modal-box .work-actions {
            display: flex;
            gap: 10px;
        }
        .work-modal-box .work-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-work-confirm {
            background: #d4af37;
            color: #000;
        }
        .btn-work-confirm:hover {
            background: #c5a030;
        }
        .btn-work-cancel {
            background: #1a1a3a;
            color: #fff;
        }
        .btn-work-cancel:hover {
            background: #2a2a5a;
        }

        /* ===== مودال تأكيد البيع ===== */
        .confirm-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-modal-overlay.open {
            display: flex;
        }
        .confirm-modal-box {
            background: #0a0a1a;
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #d4af37;
            animation: slideUp 0.25s ease;
            text-align: center;
        }
        .confirm-modal-box h3 {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .confirm-modal-box p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .confirm-modal-box .confirm-actions {
            display: flex;
            gap: 10px;
        }
        .confirm-modal-box .confirm-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-confirm-yes {
            background: #22c55e;
            color: #fff;
        }
        .btn-confirm-yes:hover {
            background: #1a9e4a;
        }
        .btn-confirm-no {
            background: #dc2626;
            color: #fff;
        }
        .btn-confirm-no:hover {
            background: #b91c1c;
        }

        /* ===== واجهة الإحصائيات ===== */
        .stats-panel {
            max-width: 800px;
            margin: 0 auto 20px;
            padding: 0 15px;
            display: none;
        }
        .stats-panel.show {
            display: block;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat-item {
            background: #0a0a1a;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid #1a1a3a;
            transition: 0.2s;
        }
        .stat-item:hover {
            border-color: #d4af37;
        }
        .stat-item .num {
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
        }
        .stat-item .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .stat-item .sub {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* ===== واجهة شنطة العمل ===== */
        .bag-panel {
            max-width: 800px;
            margin: 0 auto 20px;
            padding: 0 15px;
            display: none;
        }
        .bag-panel.show {
            display: block;
        }
        .bag-panel h3 {
            color: #d4af37;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .bag-panel .empty-msg {
            text-align: center;
            color: #666;
            padding: 30px;
        }

        @media (max-width: 600px) {
            .card-top {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .car-img-wrap {
                width: 100%;
                height: 160px;
                order: 0;
            }
            .card-info {
                flex: 1;
                min-width: 150px;
            }
            .top-bar {
                padding: 12px 16px 8px;
            }
            .logo {
                font-size: 19px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .specs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- شريط علوي -->
    <div class="top-bar">
        <div class="logo">CarSales</div>
        <div class="page-title">معرض السيارات</div>
    </div>

    <!-- ===== واجهة الإحصائيات ===== -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-grid">
            <div class="stat-item"><div class="num" id="statTotal">0</div><div class="label">إجمالي السيارات</div></div>
            <div class="stat-item"><div class="num" id="statWorking">0</div><div class="label">قيد العمل</div><div class="sub">في شنطة العمل</div></div>
            <div class="stat-item"><div class="num" id="statSold">0</div><div class="label">تم البيع</div><div class="sub">نهائياً</div></div>
        </div>
    </div>

    <!-- ===== واجهة شنطة العمل ===== -->
    <div class="bag-panel" id="bagPanel">
        <h3>👜 شنطة العمل</h3>
        <div id="bagContent">
            <div class="empty-msg">لا توجد سيارات في شنطة العمل</div>
        </div>
    </div>

    <!-- معرض السيارات -->
    <div class="gallery" id="gallery">
        <p class="no-cars" id="loadingText">جاري تحميل السيارات...</p>
    </div>

    <!-- ===== مودال البحث ===== -->

                <label>السنة</label>
                <input type="text" id="searchYear" placeholder="2023">

    <!-- ===== مودال تأكيد البيع ===== -->
    <div class="confirm-modal-overlay" id="confirmModal">
        <div class="confirm-modal-box">
            <h3>✅ تأكيد البيع</h3>
            <p id="confirmText">هل تم بيع هذه السيارة فعلاً؟</p>
            <div class="confirm-actions">
                <button class="btn-confirm-yes" id="confirmYesBtn">نعم، تم البيع</button>
                <button class="btn-confirm-no" id="confirmNoBtn">لا، لم يتم</button>
            </div>

    <!-- ===== مودال التفاصيل ===== -->
    <div class="modal-overlay" id="carModal">
        <div class="modal-content" id="modalContent">
            <div class="loading-modal">جاري تحميل التفاصيل...</div>

    <!-- ===== الشريط السفلي ===== -->
    <nav class="bottom-nav">
        <button class="nav-item active" id="navHome" onclick="goHome()">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>الرئيسية</span>

        <button class="nav-item" id="navSearch" onclick="openSearchModal()">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>بحث</span>
        </button>
        <button class="nav-item" id="navStats" onclick="showStatsUI()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>الإحصائيات</span>
        </button>
        <button class="nav-item" id="navBag" onclick="showBagUI()">
            <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <span>شنطة العمل</span>
            <span class="badge-count" id="bagCount" style="display:none;">0</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT-WCUAI7QO2IlcF3eQlJOSrTOQN_52vU",
            authDomain: "pcon-f6efd.firebaseapp.com",
            databaseURL: "https://pcon-f6efd-default-rtdb.firebaseio.com",
            projectId: "pcon-f6efd",
            storageBucket: "pcon-f6efd.firebasestorage.app",
            messagingSenderId: "971596240948",
            appId: "1:971596240948:web:e97f98af258c7c5d21d261",
            measurementId: "G-YFNVJP2G48"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gallery = document.getElementById('gallery');
        const carModal = document.getElementById('carModal');
        const modalContent = document.getElementById('modalContent');
        let carsData = {};
        let allCarsArray = [];
        let currentCarId = null;

        // ===== عناصر الواجهات =====
        const statsPanel = document.getElementById('statsPanel');
        const bagPanel = document.getElementById('bagPanel');
        const bagContent = document.getElementById('bagContent');

        // ===== دوال مساعدة =====
        function getAllImages(car) {
            let images = [];
            if (car.imageUrls && Array.isArray(car.imageUrls) && car.imageUrls.length > 0) {
                images = car.imageUrls.filter(url => url && url.length > 0);
            } else if (car.imageUrl && car.imageUrl.length > 0) {
                images = [car.imageUrl];
            }
            return images.length > 0 ? images : ['https://via.placeholder.com/600x400?text=No+Image'];
        }

        // ===== عرض الكاردات (صورة + اسم + سعر فقط) =====
        function renderCars(data) {
            gallery.innerHTML = "";
            statsPanel.classList.remove('show');
            bagPanel.classList.remove('show');

            if (!data || Object.keys(data).length === 0) {
                gallery.innerHTML = '<p class="no-cars">🚗 لا توجد سيارات منشورة حالياً.</p>';
                return;
            }

            let entries = Object.entries(data);
            allCarsArray = entries.map(([key, car]) => ({ key, car }));

            let visibleEntries = entries.filter(([key, car]) => {
                if (car.workStatus === 'working') return false;
                if (car.sold === true) return false;
                return true;
            });

            visibleEntries.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            if (visibleEntries.length === 0) {
                gallery.innerHTML = '<p class="no-cars">🚗 لا توجد سيارات متاحة حالياً.</p>';
                return;
            }

            visibleEntries.forEach(([key, car], index) => {
                const isFeatured = index === 0;
                const card = document.createElement('div');
                card.className = 'car-card' + (isFeatured ? ' featured' : '');
                card.onclick = () => openModal(key);

                const allImages = getAllImages(car);
                const thumb = allImages[0];

                card.innerHTML = `
                    <div class="card-top">
                        <div class="car-img-wrap">
                            <img src="${thumb}" alt="${car.name || 'سيارة'}" loading="lazy">
                            ${allImages.length > 1 ? `<span class="img-count">+${allImages.length}</span>` : ''}
                            <span class="status-badge">${car.status || 'متاحة'}</span>
                        </div>
                        <div class="card-info">
                            <div class="car-name">${car.name || 'سيارة'}</div>
                            <div class="price">${car.price || '0'} ج.م</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-details" onclick="event.stopPropagation(); openModal('${key}')">التفاصيل</button>
                    </div>
                `;
                gallery.appendChild(card);
            });

            updateStats();
            updateBagCount();
        }

        // ===== تحديث الإحصائيات =====
        function updateStats() {
            const total = allCarsArray.length;
            const working = allCarsArray.filter(({ car }) => car.workStatus === 'working' && car.sold !== true).length;
            const sold = allCarsArray.filter(({ car }) => car.sold === true).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statWorking').textContent = working;
            document.getElementById('statSold').textContent = sold;
        }

        // ===== عرض واجهة الإحصائيات =====
        window.showStatsUI = function() {
            statsPanel.classList.toggle('show');
            bagPanel.classList.remove('show');
            gallery.style.display = statsPanel.classList.contains('show') ? 'none' : 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('navStats').classList.add('active');
            updateStats();
        };

        // ===== عرض واجهة شنطة العمل =====
        window.showBagUI = function() {
            const workingCars = allCarsArray.filter(({ car }) => car.workStatus === 'working' && car.sold !== true);

            bagPanel.classList.toggle('show');
            statsPanel.classList.remove('show');
            gallery.style.display = bagPanel.classList.contains('show') ? 'none' : 'block';

            if (workingCars.length === 0) {
                bagContent.innerHTML = '<div class="empty-msg">👜 لا توجد سيارات في شنطة العمل</div>';
            } else {
                bagContent.innerHTML = '';
                workingCars.forEach(({ key, car }) => {
                    const div = document.createElement('div');
                    div.className = 'car-card';
                    div.style.marginBottom = '12px';
                    div.onclick = () => openModal(key);
                    const allImages = getAllImages(car);
                    const thumb = allImages[0];
                    const days = car.workDays || '?';
                    const startDate = car.workStartDate ? new Date(car.workStartDate).toLocaleDateString('ar-EG') : 'غير معروف';

                    div.innerHTML = `
                        <div class="card-top">
                            <div class="car-img-wrap">
                                <img src="${thumb}" alt="${car.name || 'سيارة'}" loading="lazy">
                                <span class="status-badge">💼 قيد العمل</span>
                            </div>
                            <div class="card-info">
                                <div class="car-name">${car.name || 'سيارة'}</div>
                                <div class="price">${car.price || '0'} ج.م</div>
                                <div style="font-size:11px;color:#888;">متوقع ${days} يوم • بدأ: ${startDate}</div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-details" onclick="event.stopPropagation(); openModal('${key}')">دخول</button>
                        </div>
                    `;
                    bagContent.appendChild(div);
                });
            }

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('navBag').classList.add('active');
            updateBagCount();
        };

        // ===== تحديث عدد شنطة العمل =====
        function updateBagCount() {
            const count = allCarsArray.filter(({ car }) => car.workStatus === 'working' && car.sold !== true).length;
            const bagCount = document.getElementById('bagCount');
            if (count > 0) {
                bagCount.style.display = 'flex';
                bagCount.textContent = count;
            } else {
                bagCount.style.display = 'none';
            }
        }

        // ===== البحث المتقدم =====
        function advancedSearch() {
            const nameQ = document.getElementById('searchName').value.trim().toLowerCase();
            const priceFrom = parseFloat(document.getElementById('searchPriceFrom').value) || 0;
            const priceTo = parseFloat(document.getElementById('searchPriceTo').value) || Infinity;
            const yearQ = document.getElementById('searchYear').value.trim().toLowerCase();
            const colorQ = document.getElementById('searchColor').value.trim().toLowerCase();

            const filtered = allCarsArray.filter(({ car }) => {
                if (car.workStatus === 'working') return false;
                if (car.sold === true) return false;

                const name = (car.name || '').toLowerCase();
                const make = (car.make || '').toLowerCase();
                const model = (car.model || '').toLowerCase();
                const year = String(car.year || '').toLowerCase();
                const color = (car.color || '').toLowerCase();
                const price = parseFloat(car.price) || 0;

                let nameMatch = true;
                if (nameQ) {
                    nameMatch = name.includes(nameQ) || make.includes(nameQ) || model.includes(nameQ);
                }
                let priceMatch = (price >= priceFrom && price <= priceTo);
                let yearMatch = true;
                if (yearQ) yearMatch = year.includes(yearQ);
                let colorMatch = true;
                if (colorQ) colorMatch = color.includes(colorQ);

                return nameMatch && priceMatch && yearMatch && colorMatch;
            });

            statsPanel.classList.remove('show');
            bagPanel.classList.remove('show');
            gallery.style.display = 'block';

            if (filtered.length === 0) {
                gallery.innerHTML = '<p class="no-cars">🔍 لا توجد سيارات تطابق معايير البحث.</p>';
                return;
            }

            gallery.innerHTML = "";
            filtered.forEach(({ key, car }, index) => {
                const isFeatured = index === 0;
                const card = document.createElement('div');
                card.className = 'car-card' + (isFeatured ? ' featured' : '');
                card.onclick = () => openModal(key);
                const allImages = getAllImages(car);
                const thumb = allImages[0];

                card.innerHTML = `
                    <div class="card-top">
                        <div class="car-img-wrap">
                            <img src="${thumb}" alt="${car.name || 'سيارة'}" loading="lazy">
                            ${allImages.length > 1 ? `<span class="img-count">+${allImages.length}</span>` : ''}
                            <span class="status-badge">${car.status || 'متاحة'}</span>
                        </div>
                        <div class="card-info">
                            <div class="car-name">${car.name || 'سيارة'}</div>
                            <div class="price">${car.price || '0'} ج.م</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-details" onclick="event.stopPropagation(); openModal('${key}')">التفاصيل</button>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // ===== مودال البحث =====
        const searchModal = document.getElementById('searchModal');

        window.openSearchModal = function() {
            searchModal.classList.add('open');
            document.getElementById('searchName').value = '';
            document.getElementById('searchPriceFrom').value = '';
            document.getElementById('searchPriceTo').value = '';
            document.getElementById('searchYear').value = '';
            document.getElementById('searchColor').value = '';
            document.getElementById('searchName').focus();
            statsPanel.classList.remove('show');
            bagPanel.classList.remove('show');
            gallery.style.display = 'block';
        };

        document.getElementById('searchCancelBtn').addEventListener('click', () => {
            searchModal.classList.remove('open');
        });
        document.getElementById('searchGoBtn').addEventListener('click', () => {
            advancedSearch();
            searchModal.classList.remove('open');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('navSearch').classList.add('active');
        });

        searchModal.addEventListener('click', (e) => {
            if (e.target === searchModal) searchModal.classList.remove('open');
        });

        // ===== مودال بدأ العمل =====
        const workModal = document.getElementById('workModal');
        const workDaysInput = document.getElementById('workDays');

        window.startWork = function(carId) {
            currentCarId = carId;
            workModal.classList.add('open');
            workDaysInput.value = '';
            workDaysInput.focus();
        };

        document.getElementById('workCancelBtn').addEventListener('click', () => {
            workModal.classList.remove('open');
            currentCarId = null;
        });

        document.getElementById('workConfirmBtn').addEventListener('click', async () => {
            const days = parseInt(workDaysInput.value);
            if (!days || days < 1 || days > 30) {
                alert('الرجاء إدخال عدد أيام صحيح (1-30)');
                return;
            }

            if (!currentCarId) {
                alert('حدث خطأ، يرجى المحاولة مرة أخرى');
                return;
            }

            try {
                const carRef = ref(db, 'cars/' + currentCarId);
                await update(carRef, {
                    workStatus: 'working',
                    workDays: days,
                    workStartDate: Date.now(),
                    sold: false
                });

                workModal.classList.remove('open');
                currentCarId = null;
                renderCars(carsData);
                updateBagCount();
                if (bagPanel.classList.contains('show')) {
                    showBagUI();
                }
            } catch (err) {
                console.error(err);
                alert('حدث خطأ: ' + err.message);
            }
        });

        workModal.addEventListener('click', (e) => {
            if (e.target === workModal) {
                workModal.classList.remove('open');
                currentCarId = null;
            }
        });

        // ===== مودال تأكيد البيع =====
        const confirmModal = document.getElementById('confirmModal');
        let confirmCarId = null;

        window.showConfirmSale = function(carId) {
            confirmCarId = carId;
            document.getElementById('confirmText').textContent = 'هل تم بيع هذه السيارة فعلاً؟ (سيتم إخفاؤها من المعرض)';
            confirmModal.classList.add('open');
        };

        document.getElementById('confirmYesBtn').addEventListener('click', async () => {
            if (!confirmCarId) return;
            try {
                const carRef = ref(db, 'cars/' + confirmCarId);
                await update(carRef, {
                    sold: true,
                    workStatus: 'completed',
                    soldDate: Date.now()
                });
                confirmModal.classList.remove('open');
                renderCars(carsData);
                updateBagCount();
                confirmCarId = null;
                if (bagPanel.classList.contains('show')) {
                    showBagUI();
                }
            } catch (err) {
                console.error(err);
                alert('حدث خطأ: ' + err.message);
            }
        });

        document.getElementById('confirmNoBtn').addEventListener('click', () => {
            confirmModal.classList.remove('open');
            confirmCarId = null;
        });

        confirmModal.addEventListener('click', (e) => {
            if (e.target === confirmModal) {
                confirmModal.classList.remove('open');
                confirmCarId = null;
            }
        });

        // ===== أيقونة الرئيسية =====
        window.goHome = function() {
            statsPanel.classList.remove('show');
            bagPanel.classList.remove('show');
            gallery.style.display = 'block';
            renderCars(carsData);
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('navHome').classList.add('active');
        };

        // ===== مودال التفاصيل =====
        async function openModal(carId) {
            carModal.classList.add('open');
            document.body.style.overflow = 'hidden';
            modalContent.innerHTML = '<div class="loading-modal">⏳ جاري التحميل...</div>';

            try {
                const snapshot = await get(ref(db, 'cars/' + carId));
                if (!snapshot.exists()) {
                    modalContent.innerHTML = '<div class="loading-modal" style="color:#f87171">السيارة غير موجودة.</div>';
                    return;
                }
                const car = snapshot.val();
                const isWorking = car.workStatus === 'working' && car.sold !== true;
                const isSold = car.sold === true;

                // ===== المواصفات المطلوبة فقط =====
                const yearVal = car.year || '-';
                const kmVal = car.km === 'New' || car.km === '0' ? 'جديدة' : (car.km || '-');
                const statusText = car.status || (car.km === 'New' || car.km === '0' ? 'جديدة' : 'مستعمل');
                const colorVal = car.color || 'فضي';

                // ===== صور السلايدر =====
                const images = getAllImages(car);
                let sliderHtml = '';
                if (images.length > 0) {
                    const slidesHtml = images.map((url, i) => `
                        <div class="slider-slide"><img src="${url}" alt="صورة ${i+1}" loading="eager"></div>
                    `).join('');
                    const dotsHtml = images.map((_, i) => `
                        <button class="slider-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></button>
                    `).join('');
                    const arrowsHtml = images.length > 1 ? `
                        <button class="slider-arrow prev" id="sliderPrev">‹</button>
                        <button class="slider-arrow next" id="sliderNext">›</button>
                    ` : '';
                    sliderHtml = `
                        <div class="slider-container" id="sliderContainer">
                            <div class="slider-counter" id="sliderCounter">1 / ${images.length}</div>
                            <div class="slider-slides" id="sliderSlides">${slidesHtml}</div>
                            ${arrowsHtml}
                            <div class="slider-dots" id="sliderDots">${dotsHtml}</div>
                        </div>
                    `;
                } else {
                    sliderHtml = `<div style="width:100%;height:280px;background:#00000d;display:flex;align-items:center;justify-content:center;color:#666;">لا توجد صور</div>`;
                }

                // ===== حالة العمل أو البيع =====
                let statusBanner = '';
                if (isWorking) {
                    const days = car.workDays || '?';
                    const startDate = car.workStartDate ? new Date(car.workStartDate).toLocaleDateString('ar-EG') : 'غير معروف';
                    statusBanner = `
                        <div class="work-status-banner">
                            <div class="title">💼 قيد العمل</div>
                            <div class="sub">متوقع البيع خلال ${days} يوم • بدأ: ${startDate}</div>
                        </div>
                    `;
                } else if (isSold) {
                    statusBanner = `
                        <div class="sold-status-banner">
                            <div class="title">✅ تم البيع</div>
                        </div>
                    `;
                }

                // ===== الأزرار =====
                let buttonsHtml = '';
                if (isWorking && !isSold) {
                    buttonsHtml = `
                        <button class="modal-act-btn sold" onclick="showConfirmSale('${carId}')">💰 تم البيع</button>
                        <button class="modal-act-btn danger" onclick="cancelWork('${carId}')">❌ إلغاء العمل</button>
                    `;
                } else if (!isWorking && !isSold) {
                    buttonsHtml = `
                        <button class="modal-act-btn work" onclick="startWork('${carId}')">💼 بدأ العمل</button>
                        <button class="modal-act-btn close-btn" onclick="closeModal()">إغلاق</button>
                    `;
                } else {
                    buttonsHtml = `
                        <button class="modal-act-btn close-btn" onclick="closeModal()">إغلاق</button>
                    `;
                }

                // ===== الوصف =====
                const descVal = car.description || 'سيارة ' + (car.name || '') + ' موديل ' + yearVal + ' بحالة ممتازة.';

                // ===== بناء المودال =====
                modalContent.innerHTML = `
                    <div class="modal-header">
                        <div class="brand">CarSales</div>
                        <button class="close-x" onclick="closeModal()">✕</button>
                    </div>
                    ${sliderHtml}
                    <div class="modal-body">
                        ${statusBanner}
                        <div class="modal-title">${car.name || 'سيارة'} ${yearVal !== '-' ? yearVal : ''}</div>
                        <div class="modal-price">${car.price || '0'} ج.م</div>

                        <!-- ===== المواصفات الأساسية (4 فقط) ===== -->
                        <div class="specs-grid">
                            <div class="spec-box">
                                <div class="spec-icon">🎨</div>
                                <div class="spec-label">اللون</div>
                                <div class="spec-value">${colorVal}</div>
                            </div>
                            <div class="spec-box">
                                <div class="spec-icon">📏</div>
                                <div class="spec-label">المسافة</div>
                                <div class="spec-value">${kmVal}</div>
                            </div>
                            <div class="spec-box">
                                <div class="spec-icon">🏷️</div>
                                <div class="spec-label">الحالة</div>
                                <div class="spec-value gold">${statusText}</div>
                            </div>
                            <div class="spec-box">
                                <div class="spec-icon">📅</div>
                                <div class="spec-label">الموديل</div>
                                <div class="spec-value gold">${yearVal}</div>
                            </div>
                        </div>

                        <!-- ===== مربع الوصف ===== -->
                        <div class="desc-section">
                            <div class="desc-title">📄 الوصف</div>
                            <div class="desc-text">${descVal}</div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        ${buttonsHtml}
                    </div>
                `;

                if (images.length > 1) {
                    initSlider(images.length);
                }
            } catch (err) {
                console.error(err);
                modalContent.innerHTML = '<div class="loading-modal" style="color:#f87171">حدث خطأ في تحميل البيانات.</div>';
            }
        }

        // ===== إلغاء العمل =====
        window.cancelWork = async function(carId) {
            if (!confirm('هل أنت متأكد من إلغاء العمل على هذه السيارة؟')) return;
            try {
                const carRef = ref(db, 'cars/' + carId);
                await update(carRef, {
                    workStatus: null,
                    workDays: null,
                    workStartDate: null
                });
                closeModal();
                renderCars(carsData);
                updateBagCount();
                if (bagPanel.classList.contains('show')) {
                    showBagUI();
                }
            } catch (err) {
                console.error(err);
                alert('حدث خطأ: ' + err.message);
            }
        };

        // ===== السلايدر =====
        function initSlider(totalSlides) {
            let current = 0;
            const slidesEl = document.getElementById('sliderSlides');
            const dots = document.querySelectorAll('.slider-dot');
            const counterEl = document.getElementById('sliderCounter');
            if (!slidesEl) return;

            function updateSlider() {
                slidesEl.style.transform = `translateX(${current * 100}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === current));
                if (counterEl) counterEl.textContent = `${current + 1} / ${totalSlides}`;
            }

            function goTo(idx) {
                current = (idx + totalSlides) % totalSlides;
                updateSlider();
            }

            const prevBtn = document.getElementById('sliderPrev');
            const nextBtn = document.getElementById('sliderNext');
            if (prevBtn) prevBtn.addEventListener('click', (e) => { e.stopPropagation();
                goTo(current - 1); });
            if (nextBtn) nextBtn.addEventListener('click', (e) => { e.stopPropagation();
                goTo(current + 1); });
            dots.forEach(dot => {
                dot.addEventListener('click', (e) => { e.stopPropagation();
                    goTo(parseInt(dot.dataset.index)); });
            });

            let touchStartX = 0,
                touchEndX = 0;
            const container = document.getElementById('sliderContainer');
            if (container) {
                container.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchStartX - touchEndX > 50) goTo(current + 1);
                    if (touchEndX - touchStartX > 50) goTo(current - 1);
                }, { passive: true });
            }
        }

        window.closeModal = function() {
            carModal.classList.remove('open');
            document.body.style.overflow = '';
        };
        carModal.addEventListener('click', (e) => { if (e.target === carModal) closeModal(); });
        window.openModal = openModal;

        // ===== تحميل البيانات =====
        const carsRef = ref(db, 'cars');
        onValue(carsRef, (snapshot) => {
            const data = snapshot.exists() ? snapshot.val() : null;
            carsData = data;
            allCarsArray = data ? Object.entries(data).map(([key, car]) => ({ key, car })) : [];
            renderCars(data);
            updateBagCount();
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('navHome').classList.add('active');
        });

        console.log('✅ CarSales - تصميم بسيط مع 4 مواصفات فقط في التفاصيل');
    </script>

</body>
</html>
